const ITER = 200000;
const EXPIRY = "2026-07-03";
const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
(function(){
  if (new Date().toISOString().slice(0,10) > EXPIRY){
    document.getElementById('gate').innerHTML =
      '<h1>金4 CD発展</h1><p style="color:#6b7280">この課題フィードバックの公開期間は終了しました。</p>';
  }
})();
async function deriveKey(pw, salt){
  const base = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2', salt, iterations:ITER, hash:'SHA-256'}, base,
           {name:'AES-GCM', length:256}, false, ['decrypt']);
}
async function tryOpen(){
  if (new Date().toISOString().slice(0,10) > EXPIRY){ return; }
  const pw = document.getElementById('pw').value;
  const err = document.getElementById('err'); err.textContent='';
  let contentKeyRaw = null;
  for (const slot of ENC.slots){
    try{
      const k = await deriveKey(pw, b64(slot.salt));
      contentKeyRaw = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64(slot.iv)}, k, b64(slot.data));
      break;
    }catch(e){}
  }
  if (!contentKeyRaw){ err.textContent='パスワードが違います'; return; }
  try{
    const ckey = await crypto.subtle.importKey('raw', contentKeyRaw, {name:'AES-GCM'}, false, ['decrypt']);
    const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64(ENC.content.iv)}, ckey, b64(ENC.content.data));
    const htmlText = new TextDecoder().decode(pt);
    document.open(); document.write(htmlText); document.close();
  }catch(e){ err.textContent='表示に失敗しました'; }
}
document.getElementById('go').onclick = tryOpen;
document.getElementById('pw').addEventListener('keydown', e=>{ if(e.key==='Enter') tryOpen(); });
